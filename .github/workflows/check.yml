name: Check packages update

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Device Model'
        required: true
        default: 'SM-S9310'
      csc:
        description: 'CSC Region'
        required: true
        default: 'CHC'
      imei:
        description: 'Device IMEI'
        required: true
        default: '350008610416934'
  schedule:
    - cron: "0 0 * * *"
  push:

jobs:
  update:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compare latest version with current version
        run: |
          MODEL="${{ github.event.inputs.model || 'SM-S9310' }}"
          CSC="${{ github.event.inputs.csc || 'CHC' }}"
          need_update=0
          latest=`curl --retry 5 --retry-delay 5 http://fota-cloud-dn.ospserver.net/firmware/${CSC}/${MODEL}/version.xml | grep latest | sed 's/^[^>]*>//' | sed 's/<.*//' | cut -d'/' -f1`
          current=`cat SmartManagerCN/version` || need_update=1
          [[ $latest != $current ]] && need_update=1
          echo "latest_version=$latest" >> $GITHUB_ENV
          echo "need_update=$need_update" >> $GITHUB_ENV
          echo "target_model=$MODEL" >> $GITHUB_ENV
          echo "target_csc=$CSC" >> $GITHUB_ENV

      - name: Free space
        if: env.need_update == 1
        uses: rokibhasansagar/slimhub_actions@v25.42.5

      - name: Set up Python 3
        if: env.need_update == 1
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        if: env.need_update == 1
        run: |
          sudo apt update
          sudo apt install -yq linux-modules-extra-$(uname -r) liblz4-tool android-sdk-libsparse-utils f2fs-tools zip
          pip3 install git+https://github.com/martinetd/samloader.git

      - name: Set up tools
        if: env.need_update == 1
        run: |
          TOOLS="lpunpack fuse.erofs"
          for tool in $TOOLS; do
              sudo cp --preserve=all ".github/tools/bin/$tool" "/usr/bin/$tool" && sudo chmod +x /usr/bin/$tool
          done

      - name: Fetch firmware
        if: env.need_update == 1
        run: |
          MODEL="${{ env.target_model }}"
          CSC="${{ env.target_csc }}"
          IMEI="${{ github.event.inputs.imei || '350008610416934' }}"
          VERSION="${{ env.latest_version }}"
          DOWN_DIR="fw_download"
          
          mkdir -p "$DOWN_DIR"
          
          # Running samloader
          python3 -m samloader -m "$MODEL" -r "$CSC" -i "$IMEI" download -v "$VERSION" -O "$DOWN_DIR"
          
          # Decrypt
          ENC_FILE=$(find "$DOWN_DIR" -name "*.enc*" | head -n 1)
          python3 -m samloader -m "$MODEL" -r "$CSC" -i "$IMEI" decrypt -v "$VERSION" -i "$ENC_FILE" -o "${DOWN_DIR}/firmware.zip"
          
          # Extract only AP from the zip
          unzip "${DOWN_DIR}/firmware.zip" "AP*" -d "$DOWN_DIR"
          echo "AP_TAR=$(find "$DOWN_DIR" -name "AP*" | head -n 1)" >> $GITHUB_ENV

      - name: Update packages
        if: env.need_update == 1
        run: |
          tar xvf ${{ env.AP_TAR }} super.img.lz4
          lz4 -d super.img.lz4 super.img
          simg2img super.img super_raw.img
          lpunpack -p system_a super_raw.img .
          mv system_a.img system.img
          mkdir system
          fuse.erofs system.img system
          
          # Copying SmartManagerCN with pathes
          cp -f -a --preserve=all "system/system/app/SmartManager_v6_DeviceSecurity_CN/SmartManager_v6_DeviceSecurity_CN.apk" "SmartManagerCN/packages/app/SmartManager_v6_DeviceSecurity_CN/"
          cp -f -a --preserve=all "system/system/priv-app/AppLock/AppLock.apk" "SmartManagerCN/packages/priv-app/SAppLock/SAppLock.apk"
          cp -f -a --preserve=all "system/system/priv-app/Firewall/Firewall.apk" "SmartManagerCN/packages/priv-app/Firewall/Firewall.apk"
          cp -f -a --preserve=all "system/system/priv-app/SmartManagerCN/SmartManagerCN.apk" "SmartManagerCN/packages/priv-app/SmartManagerCN/SmartManagerCN.apk"
          
          cp -f -a --preserve=all "system/system/etc/permissions/privapp-permissions-com.samsung.android.sm_cn.xml" "SmartManagerCN/packages/etc/permissions/"
          cp -f -a --preserve=all "system/system/etc/permissions/signature-permissions-com.samsung.android.sm_cn.xml" "SmartManagerCN/packages/etc/permissions/"
          cp -f -a --preserve=all "system/system/etc/permissions/privapp-permissions-com.samsung.android.applock.xml" "SmartManagerCN/packages/etc/permissions/"
          cp -f -a --preserve=all "system/system/etc/permissions/privapp-permissions-com.sec.android.app.firewall.xml" "SmartManagerCN/packages/etc/permissions/"
          
          sudo umount system && rm -rf system system.img super_raw.img super.img.lz4 fw_download

      - name: Prepare Release Assets
        if: env.need_update == 1
        run: |
          cd SmartManagerCN/packages
          zip -r ../../SmartManagerCN_${{ env.latest_version }}.zip .
          cd ../..

      - name: Update current version
        if: env.need_update == 1
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          echo ${{ env.latest_version }} > SmartManagerCN/version
          git add SmartManagerCN/*
          git commit -m "SmartManagerCN: update to ${{ env.latest_version }}"

      - name: Push changes to repo
        if: env.need_update == 1
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: env.need_update == 1
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.latest_version }}
          name: SmartManager CN ${{ env.latest_version }}
          body: |
            Automated update for SmartManager CN.
            Model: ${{ env.target_model }}
            Version: ${{ env.latest_version }}
          files: SmartManagerCN_${{ env.latest_version }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
